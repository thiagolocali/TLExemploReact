name: Deploy PROD
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to PROD
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          script: |
            cd ~/docker/projetos/TLExemploReact
            git pull origin main
            docker compose -p tlexemploreact-prod -f docker-compose.prod.yml build --no-cache
            docker compose -p tlexemploreact-prod -f docker-compose.prod.yml up -d